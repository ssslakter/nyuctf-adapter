jobs_dir: "jobs"
n_attempts: 1
timeout_multiplier: 1.0

orchestrator:
  type: local
  n_concurrent_trials: 4
  quiet: false

environment:
  type: docker
  force_build: true
  delete: false

agents:
  - name: mini-swe-agent
    model_name: "anthropic/claude-sonnet-4-6"
    override_timeout_sec: 1800
    # kwargs:
      # config: "configs/mini-swe-config.yaml"

datasets:
  - path: "harbor-dataset-full"
    task_names:
      - "2013f*"
    exclude_task_names:
      - "task-broken-*"